<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lynko</title>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="container">
        <img src="../Img/logo.png" alt="Logo Lynko" class="logo">
        <div class="card">
            <h1>¡Bienvenido de vuelta!</h1>
            <p>Inicia sesión para continuar aprendiendo.</p>
            
            <form>
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Ingresa tu correo">
                </div>
                
                <div class="input-group">|
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña">
                </div>
                
                <div class="options">
                    <label>
                        <input type="checkbox" id="remember">
                        Recordarme
                    </label>
                    <a href="recuperar-password.html">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit">Iniciar sesión</button>
            </form>
            
            <div class="extra">
                <p>¿No tienes cuenta?
                    <a href="Registro.html">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>

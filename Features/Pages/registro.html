<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Lynko</title>
    <link rel="stylesheet" href="../Css/registro.css">
    <link rel="stylesheet" href="../Css/shared.css">
</head>
<body>
    <div class="container">
        <img src="../Img/logo.png" alt="Logo Lynko" class="logo">
        <div class="card">
            <h1>¡Crea tu cuenta!</h1>
            <p>Únete a Lynko y comienza tu aventura de aprendizaje.</p>
            
            <form>
                <div class="input-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Ingresa tu nombre">
                </div>
                
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Ingresa tu correo">
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Crea una contraseña (mín. 8 caracteres)">
                    <small style="color: #666; font-size: 12px; margin-top: 5px;">
                        Debe contener: mayúscula, minúscula y número
                    </small>
                </div>
                
                <div class="input-group">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <input type="password" id="confirm-password" placeholder="Confirma tu contraseña">
                </div>
                
                <div class="options">
                    <label>
                        <input type="checkbox" id="terms">
                        Acepto términos y condiciones
                    </label>
                </div>
                
                <button type="submit">Crear cuenta</button>
            </form>
            
            <div class="extra">
                <p>¿Ya tienes cuenta?
                    <a href="Login.html">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </div>
    
    <!-- Script para validaciones -->
    <script src="main.js"></script>
</body>
</html>
